# CI: lint -> test -> build the Docker image for every service.
#
# Registry push and the deployment step are deliberately documented rather
# than implemented — see README.md § "CI/CD" for what those jobs would look
# like and § "Kubernetes strategy" for the deployment target.

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check services libs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/*/requirements.txt
      - name: Install system libraries for MediaPipe
        # Same packages the classification Dockerfile installs: mediapipe's
        # bundled OpenCV needs libGL/libglib at import time.
        run: sudo apt-get update -q && sudo apt-get install -y -q libgl1 libglib2.0-0
      - name: Install dependencies
        run: |
          pip install -r services/auth/requirements.txt \
                      -r services/submissions/requirements.txt \
                      -r services/classification/requirements.txt \
                      pytest pytest-github-actions-annotate-failures
      - name: Download classifier model
        # Without the weights the classification tests auto-skip; download so
        # they actually run (the Docker image ships them the same way). The
        # models dir must be created first: its only content is gitignored,
        # so the checkout doesn't contain it.
        run: |
          mkdir -p services/classification/models
          curl -fL -o services/classification/models/efficientnet_lite0.tflite \
            https://storage.googleapis.com/mediapipe-models/image_classifier/efficientnet_lite0/float32/latest/efficientnet_lite0.tflite
      - name: Run tests
        # Same invocation as README § "Testing & linting": pytest per package.
        # Failures surface as annotations; the ::error marker names the
        # package so a red run is diagnosable from the run summary alone.
        run: |
          fail=0
          for pkg in libs/shared services/auth services/submissions services/classification; do
            if ! out=$(cd "$pkg" && PYTHONPATH=".:../../libs/shared" pytest -q 2>&1); then
              echo "$out"
              detail=$(echo "$out" | tail -25 | python3 -c "import sys,urllib.parse; print(urllib.parse.quote(sys.stdin.read()))")
              echo "::error::pytest failed in $pkg:%0A$detail"
              fail=1
            fi
          done
          exit $fail

  build:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, submissions, classification]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: false
          tags: photo-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # No registry push or deploy job by design: there is no registry account or
  # target cluster for this assessment. Both steps are documented in
  # README.md § "CI/CD" (push job + secrets, then kubectl/Helm against the
  # manifests described in the Kubernetes strategy section).
