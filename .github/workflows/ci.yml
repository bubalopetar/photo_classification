# CI: lint -> test -> build (and push images to Docker Hub on main).
#
# The deployment step is deliberately documented rather than implemented —
# see README.md § "Deployment & CI/CD" for the Kubernetes strategy and what
# the deploy job would look like.
#
# Required repository secrets (only for the push step on main):
#   DOCKERHUB_USERNAME — Docker Hub account
#   DOCKERHUB_TOKEN    — Docker Hub access token (Read & Write)

name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check services libs

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: services/*/requirements.txt
      - name: Install dependencies
        run: |
          pip install -r services/auth/requirements.txt \
                      -r services/submissions/requirements.txt \
                      -r services/classification/requirements.txt \
                      pytest
      - name: Download classifier model
        # Without the weights the classification tests auto-skip; download so
        # they actually run (the Docker image ships them the same way).
        run: |
          curl -fL -o services/classification/models/efficientnet_lite0.tflite \
            https://storage.googleapis.com/mediapipe-models/image_classifier/efficientnet_lite0/float32/latest/efficientnet_lite0.tflite
      - name: Run tests
        # Same invocation as README § "Testing & linting": pytest per package.
        run: |
          (cd libs/shared && PYTHONPATH="." pytest -q)
          for svc in auth submissions classification; do
            (cd "services/$svc" && PYTHONPATH=".:../../libs/shared" pytest -q)
          done

  build-and-push:
    needs: [lint, test]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [auth, submissions, classification]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          # The || fallback keeps the tag valid on PR builds where secrets
          # are unavailable (push is skipped there anyway).
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/photo-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME || 'local' }}/photo-${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max

  # No deploy job by design: there is no target cluster for this assessment.
  # The intended deployment step (kubectl/Helm against the manifests described
  # in the README's Kubernetes strategy) is documented there instead.
