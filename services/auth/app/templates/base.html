<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Photo Classification{% endblock %}</title>
  <style>
    :root {
      color-scheme: light dark;
      --accent: #4f6df5;
      --accent-2: #7a5cf0;
      --accent-soft: rgba(79, 109, 245, .12);
      --text: #1b1f27;
      --text-muted: #667085;
      --card-bg: #ffffff;
      --card-border: #e7eaf1;
      --input-bg: #ffffff;
      --input-border: #d5dae4;
      --ring: rgba(79, 109, 245, .25);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --text: #e9ebf1;
        --text-muted: #98a1b3;
        --card-bg: #1d2027;
        --card-border: #2b2f3a;
        --input-bg: #15171d;
        --input-border: #3a3f4d;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 2rem 1rem;
      color: var(--text);
      background:
        radial-gradient(700px 340px at 15% -5%, var(--accent-soft), transparent 60%),
        radial-gradient(700px 340px at 90% 105%, rgba(122, 92, 240, .10), transparent 60%),
        #f5f7fc;
    }
    @media (prefers-color-scheme: dark) {
      body {
        background:
          radial-gradient(700px 340px at 15% -5%, rgba(79,109,245,.14), transparent 60%),
          radial-gradient(700px 340px at 90% 105%, rgba(122,92,240,.12), transparent 60%),
          #121419;
      }
    }
    .brand {
      display: flex; align-items: center; gap: .6rem;
      margin-bottom: 1.1rem; user-select: none;
    }
    .brand .mark {
      width: 40px; height: 40px; border-radius: 12px; display: grid; place-items: center;
      font-size: 1.15rem; color: #fff;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 16px var(--ring);
    }
    .brand .name { font-weight: 700; font-size: 1.05rem; letter-spacing: -.01em; }
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      padding: 2rem 2.25rem;
      border-radius: 18px;
      box-shadow: 0 12px 40px rgba(23, 30, 55, .08);
      width: 100%; max-width: 380px;
    }
    h1 { font-size: 1.4rem; margin: 0 0 .35rem; letter-spacing: -.02em; }
    .sub { margin: 0 0 1.4rem; color: var(--text-muted); font-size: .9rem; }
    label { display: block; font-size: .82rem; margin: .9rem 0 .3rem; font-weight: 600; }
    input, select, textarea {
      width: 100%; padding: .65rem .8rem;
      background: var(--input-bg); color: var(--text);
      border: 1px solid var(--input-border);
      border-radius: 10px; font-size: .95rem; font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus, select:focus, textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--ring);
    }
    button, .btn {
      margin-top: 1.4rem; width: 100%; padding: .7rem; border: 0;
      border-radius: 10px; font-size: .95rem; font-weight: 600; cursor: pointer;
      color: #fff; text-align: center; text-decoration: none; display: block;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 6px 16px var(--ring);
      transition: transform .08s, filter .15s;
    }
    button:hover, .btn:hover { filter: brightness(1.07); }
    button:active, .btn:active { transform: translateY(1px); }
    .btn.secondary {
      background: transparent; color: var(--accent);
      border: 1px solid var(--input-border); box-shadow: none;
    }
    .btn.secondary:hover { border-color: var(--accent); background: var(--accent-soft); }
    .row { display: flex; gap: .7rem; margin-top: 1.1rem; }
    .row .btn { flex: 1; margin-top: 0; padding: .62rem .5rem; font-size: .88rem; }
    .muted { margin-top: 1.15rem; font-size: .85rem; text-align: center; color: var(--text-muted); }
    .muted a, a.link { color: var(--accent); text-decoration: none; font-weight: 600; }
    .muted a:hover, a.link:hover { text-decoration: underline; }
    .error {
      background: #fdecec; color: #b42318; border: 1px solid #f5c2c0;
      padding: .6rem .8rem; border-radius: 10px; font-size: .85rem; margin-bottom: 1rem;
    }
    @media (prefers-color-scheme: dark) {
      .error { background: rgba(180, 35, 24, .15); color: #ff9d94; border-color: rgba(180, 35, 24, .4); }
    }
  </style>
</head>
<body>
  <div class="brand"><div class="mark">📷</div><div class="name">Photo Classification</div></div>
  {% block layout %}
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% block content %}{% endblock %}
  </div>
  {% endblock %}
</body>
</html>
